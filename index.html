<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>삼각함수 탐구 - Antigravity Full Edition</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --bg: #1a1b2e; --sidebar-bg: #242542;
            --primary: #4dbfff; --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }
        .sidebar {
            width: 320px; padding: 25px; background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 15px; }
        .plot-card { flex: 1; background: var(--glass); border-radius: 15px; border: 1px solid var(--border); }
        
        .tab-group { display: flex; gap: 5px; }
        .tab { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .tab.active { background: var(--primary); color: #1a1b2e; }

        .control-item { margin-bottom: 5px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; opacity: 0.7; }
        .val-badge { float: right; color: var(--primary); font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; }

        /* 절댓값 체크박스 스타일 (image_89a58d.png 참조) */
        .check-group {
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px;
            display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem;
        }
        .check-item { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .check-item input { width: 18px; height: 18px; cursor: pointer; }

        .analysis-panel {
            background: rgba(77, 191, 255, 0.1); border: 1px solid var(--primary);
            padding: 12px; border-radius: 10px; font-size: 0.85rem; line-height: 1.6;
        }
        
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-reset { background: var(--primary); color: #1a1b2e; }
        .btn-view { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0; color:var(--primary);">삼각함수 탐구</h2>
    
    <div class="tab-group">
        <div id="t-sin" class="tab active" onclick="setMode('sin')">Sin</div>
        <div id="t-cos" class="tab" onclick="setMode('cos')">Cos</div>
        <div id="t-tan" class="tab" onclick="setMode('tan')">Tan</div>
    </div>

    <div class="control-item">
        <label>진폭 (a): <span id="v-a" class="val-badge">1</span></label>
        <input type="range" id="i-a" min="0.1" max="4" step="0.1" value="1">
    </div>
    <div class="control-item">
        <label>주기 영향 (b): <span id="v-b" class="val-badge">1</span></label>
        <input type="range" id="i-b" min="0.1" max="4" step="0.1" value="1">
    </div>
    <div class="control-item">
        <label>x축 이동 (c): <span id="v-c" class="val-badge">0π</span></label>
        <input type="range" id="i-c" min="-6.28" max="6.28" step="0.314" value="0">
    </div>
    <div class="control-item">
        <label>y축 이동 (d): <span id="v-d" class="val-badge">0</span></label>
        <input type="range" id="i-d" min="-3" max="3" step="0.1" value="0">
    </div>

    <div class="check-group">
        <label class="check-item">
            <input type="checkbox" id="abs-outer"> 전체 절댓값 $y = |f(x)|$
        </label>
        <label class="check-item">
            <input type="checkbox" id="abs-inner"> 변수 절댓값 $y = f(|x|)$
        </label>
    </div>

    <div class="analysis-panel">
        <strong>📊 분석 데이터</strong><br>
        • 최댓값: <span id="s-max">1.00</span> | 최솟값: <span id="s-min">-1.00</span><br>
        • 주기: <span id="s-period">2.00π</span>
    </div>

    <button class="btn-reset" onclick="fullReset()">전체 설정 초기화</button>
    <button class="btn-view" onclick="resetView()">그래프 보기 리셋</button>
</div>

<div class="main-content">
    <div id="p-base" class="plot-card"></div>
    <div id="p-dyn" class="plot-card"></div>
</div>

<script>
    let mode = 'sin';
    const PI = Math.PI;

    function render() {
        const a = parseFloat(document.getElementById('i-a').value);
        const b = parseFloat(document.getElementById('i-b').value);
        const c = parseFloat(document.getElementById('i-c').value);
        const d = parseFloat(document.getElementById('i-d').value);
        const absOuter = document.getElementById('abs-outer').checked;
        const absInner = document.getElementById('abs-inner').checked;

        document.getElementById('v-a').innerText = a;
        document.getElementById('v-b').innerText = b;
        document.getElementById('v-c').innerText = (c/PI).toFixed(1) + "π";
        document.getElementById('v-d').innerText = d;

        const x = [], yB = [], yD = [];
        for (let i = -16; i <= 16; i += 0.02) {
            x.push(i);
            const v1 = Math[mode](i);
            
            // 절댓값 로직 적용
            let inputX = absInner ? Math.abs(i - c) : (i - c);
            let v2 = a * Math[mode](b * inputX) + d;
            if (absOuter) v2 = Math.abs(v2);

            yB.push(mode === 'tan' && Math.abs(v1) > 15 ? null : v1);
            yD.push(mode === 'tan' && Math.abs(v2) > 15 ? null : v2);
        }

        const period = (mode === 'tan' ? PI : 2*PI) / b;
        document.getElementById('s-max').innerText = mode === 'tan' ? '∞' : Math.max(...yD.filter(v => v !== null)).toFixed(2);
        document.getElementById('s-min').innerText = mode === 'tan' ? '-∞' : Math.min(...yD.filter(v => v !== null)).toFixed(2);
        document.getElementById('s-period').innerText = (period/PI).toFixed(2) + "π";

        const layout = {
            paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#fff', size: 11 }, margin: { t: 40, b: 40, l: 50, r: 30 },
            xaxis: { gridcolor: 'rgba(255,255,255,0.03)', zerolinecolor: '#fff', tickvals: [-2*PI, -PI, 0, PI, 2*PI], ticktext: ['-2π', '-π', '0', 'π', '2π'] },
            yaxis: { gridcolor: 'rgba(255,255,255,0.03)', zerolinecolor: '#fff', range: [-5, 5] },
            showlegend: false
        };

        const shapesB = [{ type: 'rect', x0: 0, x1: (mode==='tan'?PI:2*PI), y0: -10, y1: 10, fillcolor: 'rgba(255,255,255,0.05)', line: {width: 0} }];
        const shapesD = [{ type: 'rect', x0: c, x1: c + period, y0: -10, y1: 10, fillcolor: 'rgba(255,255,255,0.12)', line: {width: 0} }];

        Plotly.react('p-base', [{ x, y: yB, line: { color: 'rgba(255,255,255,0.3)', width: 2 } }], { ...layout, title: `기본: y = ${mode}(x)`, shapes: shapesB });
        Plotly.react('p-dyn', [{ x, y: yD, line: { color: '#4dbfff', width: 3 } }], { ...layout, title: `변형 결과 그래프`, shapes: shapesD });
    }

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + m).classList.add('active');
        render();
    }

    function fullReset() {
        document.getElementById('i-a').value = 1; document.getElementById('i-b').value = 1;
        document.getElementById('i-c').value = 0; document.getElementById('i-d').value = 0;
        document.getElementById('abs-outer').checked = false;
        document.getElementById('abs-inner').checked = false;
        render(); resetView();
    }

    function resetView() {
        const r = { 'xaxis.range': [-PI*2.5, PI*2.5], 'yaxis.range': [-5, 5] };
        Plotly.relayout('p-base', r); Plotly.relayout('p-dyn', r);
    }

    window.onload = () => { render(); resetView(); };
    ['i-a', 'i-b', 'i-c', 'i-d', 'abs-outer', 'abs-inner'].forEach(id => {
        document.getElementById(id).oninput = render;
        document.getElementById(id).onchange = render;
    });
</script>
</body>
</html>
