<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>삼각함수 탐구 실험실(Moon)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root {
      --bg-color: #0f1015;
      --panel-bg: #1a1b26;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --accent-color: #00d2ff;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow: hidden;
    }

    .sidebar {
      width: 320px;
      background-color: var(--panel-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    .header h1 {
      font-size: 1.5rem;
      margin: 0 0 5px 0;
      color: var(--accent-color);
      text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.3);
      transition: color 0.3s;
    }

    .header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0 0 20px 0;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .tab {
      flex: 1;
      padding: 10px 0;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .tab.active {
      background: var(--accent-color);
      color: #000;
      border-color: var(--accent-color);
      box-shadow: 0 0 15px var(--accent-color);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-group label {
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
    }

    .control-group label span {
      font-weight: bold;
      color: var(--accent-color);
    }

    .unit {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: right;
      margin-top: -5px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: var(--accent-color);
      cursor: pointer;
      margin-top: -6px;
      box-shadow: 0 0 10px var(--accent-color);
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    input[type=checkbox] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent-color);
      cursor: pointer;
    }

    .action-btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .action-btn.primary {
      background: #3b82f6;
      color: white;
      margin-top: 10px;
    }

    .action-btn.primary:hover {
      background: #2563eb;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }

    .action-btn.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid var(--border-color);
    }

    .action-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
      overflow-y: auto;
      background: radial-gradient(circle at center, #1a1b26 0%, #0f1015 100%);
    }

    .graph-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(26, 27, 38, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.3);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 15px;
      color: #fff;
    }

    .math-tex {
      font-size: 1.1rem;
      color: #a5b4fc;
    }

    .stats {
      display: flex;
      gap: 15px;
      font-size: 0.9rem;
      color: var(--text-muted);
      align-items: center;
      flex-wrap: wrap;
    }

    .stats span {
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
    }

    .graph-container {
      flex: 1;
      min-height: 300px;
      width: 100%;
      position: relative;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .resizer {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 16px;
      flex-shrink: 0;
      cursor: row-resize;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin: -10px 0;
      color: var(--text-muted);
      font-size: 16px;
      user-select: none;
      transition: all 0.2s;
      z-index: 5;
    }

    .resizer:hover,
    .resizer:active {
      background: rgba(255, 255, 255, 0.15);
      color: var(--accent-color);
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <div class="header">
      <h1>삼각함수 탐구</h1>
      <p>기본 그래프와 변형된 그래프 비교</p>
    </div>

    <div class="tabs">
      <button class="tab active" data-type="sin">Sin</button>
      <button class="tab" data-type="cos">Cos</button>
      <button class="tab" data-type="tan">Tan</button>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>진폭 (a): <span id="val-a">1</span></label>
        <input type="range" id="slider-a" min="-5" max="5" step="0.1" value="1">
      </div>
      <div class="control-group">
        <label>주기 영향 (b): <span id="val-b">1</span></label>
        <input type="range" id="slider-b" min="-5" max="5" step="0.1" value="1">
      </div>
      <div class="control-group">
        <label>x축 평행이동 (c): <span id="val-c">0</span></label>
        <input type="range" id="slider-c" min="-4" max="4" step="0.1" value="0">
        <div class="unit">(단위: π)</div>
      </div>
      <div class="control-group">
        <label>y축 평행이동 (d): <span id="val-d">0</span></label>
        <input type="range" id="slider-d" min="-5" max="5" step="0.1" value="0">
      </div>

      <div class="checkbox-group">
        <label><input type="checkbox" id="check-absAll"> <span class="math-tex">전체 절댓값 \( y = |f(x)| \)</span></label>
        <label><input type="checkbox" id="check-absX"> <span class="math-tex">변수 절댓값 \( y = f(|x|) \)</span></label>
      </div>

      <button class="action-btn primary" id="btn-reset-all">전체 설정 초기화</button>
      <button class="action-btn secondary" id="btn-reset-view">그래프 보기 리셋</button>
    </div>
  </div>

  <div class="main-content">
    <div class="graph-panel" id="panel-original">
      <div class="panel-header">
        <h2>원본 그래프 <span id="eq-original" class="math-tex"></span></h2>
        <div class="stats">
          <span id="stat-orig-period">주기: </span>
          <span id="stat-orig-max">최댓값: </span>
          <span id="stat-orig-min">최솟값: </span>
        </div>
      </div>
      <div id="graph-original" class="graph-container"></div>
    </div>

    <div class="resizer" id="resizer">≡</div>

    <div class="graph-panel" id="panel-transformed">
      <div class="panel-header">
        <h2>변형 그래프 <span id="eq-transformed" class="math-tex"></span></h2>
        <div class="stats">
          <span id="stat-trans-period">주기: </span>
          <span id="stat-trans-max">최댓값: </span>
          <span id="stat-trans-min">최솟값: </span>
          <span id="stat-trans-asymptote"
            style="display:none; color: #ff9ed2; border-color: rgba(255, 158, 210, 0.3);">점근선: </span>
        </div>
      </div>
      <div id="graph-transformed" class="graph-container"></div>
    </div>
  </div>

  <script>
    let currentType = 'sin';

    function toFractionPi(val) {
      if (val === 0) return '0';
      let sign = val < 0 ? '-' : '';
      val = Math.abs(val);

      if (Math.abs(val - 1) < 0.001) return sign + '\\pi';

      for (let den = 1; den <= 12; den++) {
        let num = Math.round(val * den);
        if (Math.abs(val - num / den) < 0.001) {
          if (den === 1) return sign + num + '\\pi';
          let numStr = num === 1 ? '\\pi' : num + '\\pi';
          return sign + '\\frac{' + numStr + '}{' + den + '}';
        }
      }
      return sign + (Math.round(val * 100) / 100) + '\\pi';
    }

    function toUnicodePi(val) {
      if (val === 0) return '0';
      let sign = val < 0 ? '-' : '';
      val = Math.abs(val);

      if (Math.abs(val - 1) < 0.001) return sign + 'π';

      for (let den = 1; den <= 12; den++) {
        let num = Math.round(val * den);
        if (Math.abs(val - num / den) < 0.001) {
          if (den === 1) return sign + num + 'π';
          let numStr = num === 1 ? 'π' : num + 'π';
          return sign + numStr + '/' + den;
        }
      }
      return sign + (Math.round(val * 100) / 100) + 'π';
    }

    function formatNTerm(coeff) {
      if (Math.abs(coeff - 1) < 0.001) return 'n\\pi';
      for (let den = 1; den <= 12; den++) {
        let num = Math.round(coeff * den);
        if (Math.abs(coeff - num / den) < 0.001) {
          if (den === 1) return num + 'n\\pi';
          let numStr = num === 1 ? 'n\\pi' : num + 'n\\pi';
          return '\\frac{' + numStr + '}{' + den + '}';
        }
      }
      return (Math.round(coeff * 100) / 100) + 'n\\pi';
    }

    function formatConstTerm(constant) {
      if (Math.abs(constant) < 0.001) return '';
      let sign = constant < 0 ? '-' : '+';
      let val = Math.abs(constant);
      for (let den = 1; den <= 12; den++) {
        let num = Math.round(val * den);
        if (Math.abs(val - num / den) < 0.001) {
          if (den === 1) {
            let numStr = num === 1 ? '\\pi' : num + '\\pi';
            return ` ${sign} ${numStr}`;
          }
          let numStr = num === 1 ? '\\pi' : num + '\\pi';
          return ` ${sign} \\frac{${numStr}}{${den}}`;
        }
      }
      return ` ${sign} ` + (Math.round(val * 100) / 100) + '\\pi';
    }

    function formatEquation(type, a, b, c, d, absAll, absX) {
      let innerX = absX ? '|x|' : 'x';
      let argStr = '';

      if (Math.abs(c) < 0.001) {
        let bStr = Math.abs(b - 1) < 0.001 ? '' : (Math.abs(b + 1) < 0.001 ? '-' : b);
        argStr = `${bStr}${innerX}`;
      } else {
        let cVal = Math.abs(c);
        let sign = c > 0 ? '-' : '+';
        let cStr = '';
        let foundFrac = false;
        for (let den = 1; den <= 12; den++) {
          let num = Math.round(cVal * den);
          if (Math.abs(cVal - num / den) < 0.001) {
            if (den === 1) cStr = (num === 1 ? '\\pi' : num + '\\pi');
            else cStr = '\\frac{' + (num === 1 ? '\\pi' : num + '\\pi') + '}{' + den + '}';
            foundFrac = true; break;
          }
        }
        if (!foundFrac) cStr = (Math.round(cVal * 100) / 100) + '\\pi';

        if (Math.abs(b - 1) < 0.001) argStr = `${innerX} ${sign} ${cStr}`;
        else if (Math.abs(b + 1) < 0.001) argStr = `-(${innerX} ${sign} ${cStr})`;
        else argStr = `${b}(${innerX} ${sign} ${cStr})`;
      }
      if (argStr === '') argStr = innerX;
      let funcTerm = `\\${type}(${argStr})`;

      let aStr = '';
      if (Math.abs(a - 1) < 0.001) { }
      else if (Math.abs(a + 1) < 0.001) aStr = '-';
      else aStr = a;

      let result = aStr + funcTerm;
      if (absAll) result = `\\left| ${result} \\right|`;

      if (Math.abs(d) >= 0.001) {
        let dStr = d > 0 ? `+${d}` : `${d}`;
        result += ` ${dStr}`;
      }
      return `y = ${result}`;
    }

    function generateData(type, a, b, c, d, absAll, absX) {
      const xVals = [];
      const yVals = [];
      const step = 0.01;
      let prevRawY = null;

      for (let x = -5 * Math.PI; x <= 5 * Math.PI; x += step) {
        let x_in = absX ? Math.abs(x) : x;
        let rawVal;
        if (type === 'sin') rawVal = Math.sin(b * (x_in - c * Math.PI));
        else if (type === 'cos') rawVal = Math.cos(b * (x_in - c * Math.PI));
        else if (type === 'tan') rawVal = Math.tan(b * (x_in - c * Math.PI));

        let rawY = a * rawVal + d;
        let y = absAll ? Math.abs(rawY) : rawY;

        if (type === 'tan') {
          if (prevRawY !== null && Math.abs(rawY - prevRawY) > 5 && Math.sign(rawY) !== Math.sign(prevRawY)) {
            xVals.push(x - step / 2);
            yVals.push(null);
          }
        }

        xVals.push(x);
        yVals.push(y);
        prevRawY = rawY;
      }
      return { x: xVals, y: yVals };
    }

    function calculateStats(type, a, b, c, d, absAll, absX) {
      let maxVal = null, minVal = null, periodVal = null;
      let periodStr = "-", maxStr = "-", minStr = "-";
      let pBase = (type === 'tan' ? Math.PI : 2 * Math.PI) / Math.abs(b);

      if (absX) {
        periodVal = null; periodStr = "없음";
      } else {
        if (absAll) {
          if (type === 'tan') periodVal = pBase;
          else periodVal = (d === 0) ? pBase / 2 : pBase;
        } else {
          periodVal = pBase;
        }
        if (periodVal) periodStr = toFractionPi(periodVal / Math.PI);
      }

      let M0 = Math.abs(a) + d;
      let m0 = -Math.abs(a) + d;

      if (type === 'tan') {
        maxVal = Infinity; maxStr = "없음";
        if (absAll) { minVal = 0; minStr = "0"; }
        else { minVal = -Infinity; minStr = "없음"; }
      } else {
        if (absAll) {
          maxVal = Math.max(Math.abs(M0), Math.abs(m0));
          minVal = (m0 <= 0 && M0 >= 0) ? 0 : Math.min(Math.abs(M0), Math.abs(m0));
        } else {
          maxVal = M0; minVal = m0;
        }
        maxVal = Math.round(maxVal * 1000) / 1000;
        minVal = Math.round(minVal * 1000) / 1000;
        maxStr = maxVal.toString();
        minStr = minVal.toString();
      }

      let asymptoteStr = "", asymptoteFn = null, asymptoteVals = false;
      if (type === 'tan') {
        asymptoteVals = true;
        let nTermStr = formatNTerm(1 / Math.abs(b));
        let constTermStr = formatConstTerm((1 / (2 * Math.abs(b))) + c);

        if (absX) {
          asymptoteStr = `x = \\pm \\left( ${nTermStr}${constTermStr} \\right) \\quad (단, x \\ge 0)`;
          asymptoteFn = (n) => (n / Math.abs(b) + 1 / (2 * Math.abs(b)) + c) * Math.PI;
        } else {
          asymptoteStr = `x = ${nTermStr}${constTermStr}`;
          asymptoteFn = (n) => (n / b + 1 / (2 * b) + c) * Math.PI;
        }
      }

      return { periodVal, periodStr, maxVal, maxStr, minVal, minStr, asymptoteStr, asymptoteFn, asymptoteVals };
    }

    function getTickVals() {
      let vals = [], texts = [];
      for (let i = -20; i <= 20; i++) {
        vals.push(i * Math.PI);
        if (i === 0) texts.push('0');
        else if (i === 1) texts.push('π');
        else if (i === -1) texts.push('-π');
        else texts.push(`${i}π`);
      }
      for (let i = -20; i < 20; i++) {
        vals.push(i * Math.PI + Math.PI / 2);
        let num = 2 * i + 1;
        if (num === 1) texts.push('π/2');
        else if (num === -1) texts.push('-π/2');
        else texts.push(`${num}π/2`);
      }
      return { vals, texts };
    }

    function getLayout(shapes, annotations) {
      let ticks = getTickVals();
      let axisAnnotations = [
        { x: 1, y: 0, xref: 'paper', yref: 'y', text: '<i>x</i>', showarrow: false, xanchor: 'right', yanchor: 'bottom', font: { size: 16, color: '#fff' }, xshift: 0, yshift: 10 },
        { x: 0, y: 1, xref: 'x', yref: 'paper', text: '<i>y</i>', showarrow: false, xanchor: 'left', yanchor: 'top', font: { size: 16, color: '#fff' }, xshift: 15, yshift: 0 },
        { x: 0, y: 0, xref: 'x', yref: 'y', text: 'O', showarrow: false, xanchor: 'right', yanchor: 'top', font: { size: 16, color: '#fff' }, xshift: -5, yshift: -5 },
        { x: 1, y: 0, xref: 'paper', yref: 'y', text: '', showarrow: true, ax: -20, ay: 0, arrowhead: 4, arrowsize: 1.5, arrowwidth: 3, arrowcolor: 'rgba(255,255,255,1)' },
        { x: 0, y: 1, xref: 'x', yref: 'paper', text: '', showarrow: true, ax: 0, ay: 20, arrowhead: 4, arrowsize: 1.5, arrowwidth: 3, arrowcolor: 'rgba(255,255,255,1)' }
      ];
      return {
        margin: { t: 30, b: 30, l: 40, r: 20 },
        paper_bgcolor: 'transparent',
        plot_bgcolor: 'transparent',
        font: { color: '#e2e8f0' },
        xaxis: {
          range: [-3 * Math.PI, 3 * Math.PI],
          tickvals: ticks.vals, ticktext: ticks.texts,
          showgrid: true, gridcolor: 'rgba(255,255,255,0.1)',
          zeroline: true, zerolinecolor: 'rgba(255,255,255,1)', zerolinewidth: 3, fixedrange: false
        },
        yaxis: {
          range: [-6, 6],
          showgrid: true, gridcolor: 'rgba(255,255,255,0.1)',
          zeroline: true, zerolinecolor: 'rgba(255,255,255,1)', zerolinewidth: 3, fixedrange: false
        },
        shapes: shapes, annotations: annotations.concat(axisAnnotations),
        dragmode: 'pan', hovermode: 'x'
      };
    }

    function getCurrentRange(graphId) {
      let gd = document.getElementById(graphId);
      if (gd && gd.layout && gd.layout.xaxis) {
        return { xr: gd.layout.xaxis.range, yr: gd.layout.yaxis.range };
      }
      return null;
    }

    function updateMath() {
      if (window.MathJax && window.MathJax.typesetPromise) {
        MathJax.typesetPromise([
          document.getElementById('eq-original'),
          document.getElementById('eq-transformed'),
          document.getElementById('stat-orig-period'),
          document.getElementById('stat-trans-period'),
          document.getElementById('stat-trans-asymptote')
        ]).catch(err => console.log(err.message));
      }
    }

    function drawGraphs() {
      let a = parseFloat(document.getElementById('slider-a').value);
      let b = parseFloat(document.getElementById('slider-b').value);
      let c = parseFloat(document.getElementById('slider-c').value);
      let d = parseFloat(document.getElementById('slider-d').value);
      let absAll = document.getElementById('check-absAll').checked;
      let absX = document.getElementById('check-absX').checked;

      if (Math.abs(b) < 0.001) b = 0.001;

      let origData = generateData(currentType, 1, 1, 0, 0, false, false);
      let transData = generateData(currentType, a, b, c, d, absAll, absX);

      document.getElementById('eq-original').innerHTML = `\\(y = \\${currentType}(x)\\)`;
      document.getElementById('eq-transformed').innerHTML = `\\(${formatEquation(currentType, a, b, c, d, absAll, absX)}\\)`;

      let origStats = calculateStats(currentType, 1, 1, 0, 0, false, false);
      let transStats = calculateStats(currentType, a, b, c, d, absAll, absX);

      document.getElementById('stat-orig-period').innerHTML = `주기: \\(${origStats.periodStr}\\)`;
      document.getElementById('stat-orig-max').innerHTML = `최댓값: ${origStats.maxStr}`;
      document.getElementById('stat-orig-min').innerHTML = `최솟값: ${origStats.minStr}`;

      document.getElementById('stat-trans-period').innerHTML = `주기: \\(${transStats.periodStr}\\)`;
      document.getElementById('stat-trans-max').innerHTML = `최댓값: ${transStats.maxStr}`;
      document.getElementById('stat-trans-min').innerHTML = `최솟값: ${transStats.minStr}`;

      if (currentType === 'tan') {
        document.getElementById('stat-trans-asymptote').style.display = 'flex';
        document.getElementById('stat-trans-asymptote').innerHTML = `점근선: \\(${transStats.asymptoteStr}\\)`;
      } else {
        document.getElementById('stat-trans-asymptote').style.display = 'none';
      }

      let origShapes = [], transShapes = [], origAnnotations = [], transAnnotations = [];

      if (origStats.periodVal) {
        let p = origStats.periodVal;
        origShapes.push({ type: 'rect', x0: 0, x1: p, y0: 0, y1: 1, yref: 'paper', fillcolor: 'rgba(255, 255, 255, 0.1)', line: { width: 0 } });
        origAnnotations.push({ x: p, y: 0.95, ax: 0, ay: 0.95, xref: 'x', yref: 'paper', axref: 'x', ayref: 'paper', showarrow: true, arrowhead: 2, arrowside: 'start+end', arrowcolor: 'rgba(255,255,255,0.8)' });
        origAnnotations.push({ x: p / 2, y: 1.05, xref: 'x', yref: 'paper', text: `주기: ${toUnicodePi(p / Math.PI)}`, showarrow: false, font: { color: 'white', size: 14 } });
      }

      if (transStats.periodVal) {
        let p = transStats.periodVal;
        let startX = c * Math.PI;
        if (currentType === 'cos' && !absAll && !absX) { }
        transShapes.push({ type: 'rect', x0: startX, x1: startX + p, y0: 0, y1: 1, yref: 'paper', fillcolor: 'rgba(255, 255, 255, 0.1)', line: { width: 0 } });
        transAnnotations.push({ x: startX + p, y: 0.95, ax: startX, ay: 0.95, xref: 'x', yref: 'paper', axref: 'x', ayref: 'paper', showarrow: true, arrowhead: 2, arrowside: 'start+end', arrowcolor: 'rgba(255,255,255,0.8)' });
        transAnnotations.push({ x: startX + p / 2, y: 1.05, xref: 'x', yref: 'paper', text: `주기: ${toUnicodePi(p / Math.PI)}`, showarrow: false, font: { color: 'white', size: 14 } });
      }

      const addMaxMinLines = (stats, shapes, annotations) => {
        if (stats.maxVal !== Infinity && stats.maxVal !== null) {
          shapes.push({ type: 'line', x0: 0, x1: 1, xref: 'paper', y0: stats.maxVal, y1: stats.maxVal, line: { color: 'rgba(255, 100, 100, 0.5)', dash: 'dot', width: 2 } });
          annotations.push({ x: 0, y: stats.maxVal, xref: 'x', yref: 'y', text: stats.maxStr, showarrow: false, xanchor: 'right', xshift: -5, font: { color: 'rgba(255, 150, 150, 1)', size: 12 } });
        }
        if (stats.minVal !== -Infinity && stats.minVal !== null) {
          shapes.push({ type: 'line', x0: 0, x1: 1, xref: 'paper', y0: stats.minVal, y1: stats.minVal, line: { color: 'rgba(100, 150, 255, 0.5)', dash: 'dot', width: 2 } });
          annotations.push({ x: 0, y: stats.minVal, xref: 'x', yref: 'y', text: stats.minStr, showarrow: false, xanchor: 'right', xshift: -5, font: { color: 'rgba(150, 200, 255, 1)', size: 12 } });
        }
      };
      addMaxMinLines(origStats, origShapes, origAnnotations);
      addMaxMinLines(transStats, transShapes, transAnnotations);

      const processFeatures = (p_a, p_b, p_c, p_d, p_absAll, p_absX, stats, shapes, annotations) => {
        let candidates = [0];
        if (currentType === 'tan') {
          let theta = Math.atan(-p_d / p_a);
          for (let n = -40; n <= 40; n++) {
            candidates.push((theta + n * Math.PI) / p_b + p_c * Math.PI);
          }
        } else {
          for (let n = -40; n <= 40; n++) {
            candidates.push((n * Math.PI / 2) / p_b + p_c * Math.PI);
          }
          if (Math.abs(p_d / p_a) <= 1) {
            let theta = currentType === 'sin' ? Math.asin(-p_d / p_a) : Math.acos(-p_d / p_a);
            for (let n = -40; n <= 40; n++) {
              if (currentType === 'sin') {
                candidates.push((theta + 2 * n * Math.PI) / p_b + p_c * Math.PI);
                candidates.push((Math.PI - theta + 2 * n * Math.PI) / p_b + p_c * Math.PI);
              } else {
                candidates.push((theta + 2 * n * Math.PI) / p_b + p_c * Math.PI);
                candidates.push((-theta + 2 * n * Math.PI) / p_b + p_c * Math.PI);
              }
            }
          }
        }

        let allCandidates = [];
        candidates.forEach(x => {
          allCandidates.push(x);
          if (p_absX) allCandidates.push(-x);
        });

        let epsilon = 0.0001;
        let drawnX = new Set();

        allCandidates.forEach(x => {
          if (x < -6 * Math.PI || x > 6 * Math.PI) return;

          let x_round = Math.round(x * 1000) / 1000;
          if (drawnX.has(x_round)) return;
          drawnX.add(x_round);

          let x_in = p_absX ? Math.abs(x) : x;
          let rawVal;
          if (currentType === 'sin') rawVal = Math.sin(p_b * (x_in - p_c * Math.PI));
          else if (currentType === 'cos') rawVal = Math.cos(p_b * (x_in - p_c * Math.PI));
          else if (currentType === 'tan') rawVal = Math.tan(p_b * (x_in - p_c * Math.PI));

          let rawY = p_a * rawVal + p_d;
          let y = p_absAll ? Math.abs(rawY) : rawY;

          let isMax = stats.maxVal !== null && stats.maxVal !== Infinity && Math.abs(y - stats.maxVal) < epsilon;
          let isMin = stats.minVal !== null && stats.minVal !== -Infinity && Math.abs(y - stats.minVal) < epsilon;
          let isRoot = Math.abs(y) < epsilon;

          if (isMax || isMin || isRoot) {
            if (isMax || isMin) {
              shapes.push({
                type: 'line', x0: x, x1: x, y0: 0, y1: y,
                line: { color: isMax ? 'rgba(255, 100, 100, 0.7)' : 'rgba(100, 150, 255, 0.7)', dash: 'dot', width: 1.5 }
              });
            }

            let textColor = isRoot ? '#aaffaa' : (isMax ? '#ffaaaa' : '#aaaaff');
            if (isRoot && isMin) textColor = '#aaaaff';

            annotations.push({
              x: x, y: 0, xref: 'x', yref: 'y',
              text: toUnicodePi(x / Math.PI),
              showarrow: false,
              yanchor: y >= -epsilon ? 'top' : 'bottom',
              yshift: y >= -epsilon ? -5 : 5,
              font: { color: textColor, size: 12 }
            });

            if (isRoot) {
              annotations.push({
                x: x, y: 0, xref: 'x', yref: 'y',
                text: '●', showarrow: false, yshift: 1,
                font: { color: textColor, size: 10 }
              });
            }
          }
        });
      };

      processFeatures(1, 1, 0, 0, false, false, origStats, origShapes, origAnnotations);
      processFeatures(a, b, c, d, absAll, absX, transStats, transShapes, transAnnotations);

      if (currentType === 'tan') {
        for (let n = -15; n <= 15; n++) {
          let ax = Math.PI / 2 + n * Math.PI;
          origShapes.push({ type: 'line', x0: ax, x1: ax, y0: 0, y1: 1, yref: 'paper', line: { color: 'rgba(255, 255, 255, 0.4)', dash: 'dot', width: 1 } });
        }
        if (transStats.asymptoteVals) {
          for (let n = -30; n <= 30; n++) {
            let R_n = transStats.asymptoteFn(n);
            if (absX) {
              if (R_n > 0.0001) {
                transShapes.push({ type: 'line', x0: R_n, x1: R_n, y0: 0, y1: 1, yref: 'paper', line: { color: 'rgba(255, 255, 255, 0.4)', dash: 'dot', width: 1 } });
                transShapes.push({ type: 'line', x0: -R_n, x1: -R_n, y0: 0, y1: 1, yref: 'paper', line: { color: 'rgba(255, 255, 255, 0.4)', dash: 'dot', width: 1 } });
              } else if (Math.abs(R_n) <= 0.0001) {
                transShapes.push({ type: 'line', x0: 0, x1: 0, y0: 0, y1: 1, yref: 'paper', line: { color: 'rgba(255, 255, 255, 0.4)', dash: 'dot', width: 1 } });
              }
            } else {
              if (R_n > -10 * Math.PI && R_n < 10 * Math.PI) {
                transShapes.push({ type: 'line', x0: R_n, x1: R_n, y0: 0, y1: 1, yref: 'paper', line: { color: 'rgba(255, 255, 255, 0.4)', dash: 'dot', width: 1 } });
              }
            }
          }
        }
      }

      let origRange = getCurrentRange('graph-original');
      let transRange = getCurrentRange('graph-transformed');

      let layoutOrig = getLayout(origShapes, origAnnotations);
      let layoutTrans = getLayout(transShapes, transAnnotations);

      if (origRange) { layoutOrig.xaxis.range = origRange.xr; layoutOrig.yaxis.range = origRange.yr; }
      if (transRange) { layoutTrans.xaxis.range = transRange.xr; layoutTrans.yaxis.range = transRange.yr; }

      let color = currentType === 'sin' ? '#00d2ff' : (currentType === 'cos' ? '#ff007a' : '#00ff88');

      Plotly.react('graph-original', [{ x: origData.x, y: origData.y, type: 'scatter', mode: 'lines', line: { color: '#00d2ff', width: 3 } }], layoutOrig, { displayModeBar: false });
      Plotly.react('graph-transformed', [{ x: transData.x, y: transData.y, type: 'scatter', mode: 'lines', line: { color: color, width: 3 } }], layoutTrans, { displayModeBar: false });

      updateMath();
    }

    function setupSync() {
      let gdOrig = document.getElementById('graph-original');
      let gdTrans = document.getElementById('graph-transformed');
      let isSyncing = false;

      gdOrig.on('plotly_relayout', (e) => {
        if (isSyncing) return;
        isSyncing = true;
        if (e['xaxis.range[0]']) {
          Plotly.relayout(gdTrans, { 'xaxis.range': [e['xaxis.range[0]'], e['xaxis.range[1]']] }).then(() => isSyncing = false);
        } else { isSyncing = false; }
      });
      gdTrans.on('plotly_relayout', (e) => {
        if (isSyncing) return;
        isSyncing = true;
        if (e['xaxis.range[0]']) {
          Plotly.relayout(gdOrig, { 'xaxis.range': [e['xaxis.range[0]'], e['xaxis.range[1]']] }).then(() => isSyncing = false);
        } else { isSyncing = false; }
      });
    }

    function resetView() {
      let update = { 'xaxis.range': [-3 * Math.PI, 3 * Math.PI], 'yaxis.range': [-6, 6] };
      Plotly.relayout('graph-original', update);
      Plotly.relayout('graph-transformed', update);
    }

    function init() {
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          currentType = e.target.dataset.type;

          let color = currentType === 'sin' ? '#00d2ff' : (currentType === 'cos' ? '#ff007a' : '#00ff88');
          document.documentElement.style.setProperty('--accent-color', color);
          drawGraphs();
        });
      });

      const sliders = ['a', 'b', 'c', 'd'];
      sliders.forEach(id => {
        document.getElementById(`slider-${id}`).addEventListener('input', (e) => {
          document.getElementById(`val-${id}`).innerText = e.target.value;
          drawGraphs();
        });
      });

      document.getElementById('check-absAll').addEventListener('change', drawGraphs);
      document.getElementById('check-absX').addEventListener('change', drawGraphs);

      document.getElementById('btn-reset-all').addEventListener('click', () => {
        document.getElementById('slider-a').value = 1; document.getElementById('val-a').innerText = '1';
        document.getElementById('slider-b').value = 1; document.getElementById('val-b').innerText = '1';
        document.getElementById('slider-c').value = 0; document.getElementById('val-c').innerText = '0';
        document.getElementById('slider-d').value = 0; document.getElementById('val-d').innerText = '0';
        document.getElementById('check-absAll').checked = false;
        document.getElementById('check-absX').checked = false;
        drawGraphs();
        resetView();
      });

      document.getElementById('btn-reset-view').addEventListener('click', resetView);
      document.documentElement.style.setProperty('--accent-color', '#00d2ff');

      drawGraphs();
      setupSync();

      const resizer = document.getElementById('resizer');
      const topPanel = document.getElementById('panel-original');
      const bottomPanel = document.getElementById('panel-transformed');
      const container = document.querySelector('.main-content');

      let isResizing = false;
      let resizeRAF = null;

      const startResize = (e) => {
        isResizing = true;
        document.body.style.cursor = 'row-resize';
      };

      const doResize = (e) => {
        if (!isResizing) return;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let containerRect = container.getBoundingClientRect();
        let newTopHeight = clientY - containerRect.top - 20;

        if (newTopHeight < 150) newTopHeight = 150;
        if (newTopHeight > containerRect.height - 200) newTopHeight = containerRect.height - 200;

        topPanel.style.flex = `0 0 ${newTopHeight}px`;
        bottomPanel.style.flex = '1 1 0%';

        if (!resizeRAF) {
          resizeRAF = requestAnimationFrame(() => {
            Plotly.Plots.resize('graph-original');
            Plotly.Plots.resize('graph-transformed');
            resizeRAF = null;
          });
        }
      };

      const stopResize = () => {
        isResizing = false;
        document.body.style.cursor = 'default';
      };

      resizer.addEventListener('mousedown', startResize);
      resizer.addEventListener('touchstart', startResize, { passive: true });

      window.addEventListener('mousemove', doResize);
      window.addEventListener('touchmove', doResize, { passive: true });

      window.addEventListener('mouseup', stopResize);
      window.addEventListener('touchend', stopResize);
    }

    document.addEventListener('DOMContentLoaded', () => {
      init();
      setTimeout(updateMath, 500);
    });
  </script>
</body>
