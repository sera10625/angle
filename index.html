<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigonometric Explorer - Antigravity Style</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --primary-color: #56bbff; /* 안티그래비티 시그니처 블루 */
            --accent-color: #ffb74d;
            --text-main: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }
        /* 왼쪽 패널 스타일 보강 */
        .sidebar {
            width: 340px; padding: 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; gap: 20px;
        }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        .plot-container { flex: 1; background: var(--glass-bg); border-radius: 16px; border: 1px solid var(--glass-border); }
        
        .control-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 10px; opacity: 0.8; }
        .val-display { float: right; color: var(--primary-color); font-weight: bold; }
        
        /* 왼쪽 실시간 수치 표시창 */
        .status-panel {
            background: rgba(86, 187, 255, 0.1);
            border: 1px solid var(--primary-color);
            padding: 12px; border-radius: 10px;
            font-size: 0.9rem; line-height: 1.6;
        }

        .tabs { display: flex; gap: 8px; }
        .tab { flex: 1; padding: 10px; background: rgba(255,255,255,0.1); text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--primary-color); color: #0f172a; font-weight: bold; }
        
        button {
            padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-reset { background: #ff4d4d; color: white; }
        .btn-view { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); }
        button:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0; color:var(--primary-color);">삼각함수 탐구</h2>
    
    <div class="tabs">
        <div id="tab-sin" class="tab active" onclick="updateMode('sin')">Sin</div>
        <div id="tab-cos" class="tab" onclick="updateMode('cos')">Cos</div>
        <div id="tab-tan" class="tab" onclick="updateMode('tan')">Tan</div>
    </div>

    <div class="control-card">
        <label>진폭 (a): <span id="a-val" class="val-display">1</span></label>
        <input type="range" id="input-a" min="0.1" max="4" step="0.1" value="1">
        
        <label>주기 영향 (b): <span id="b-val" class="val-display">1</span></label>
        <input type="range" id="input-b" min="0.1" max="4" step="0.1" value="1">
        
        <label>x축 이동 (c): <span id="c-val" class="val-display">0π</span></label>
        <input type="range" id="input-c" min="-6.28" max="6.28" step="0.314" value="0">
        
        <label>y축 이동 (d): <span id="d-val" class="val-display">0</span></label>
        <input type="range" id="input-d" min="-3" max="3" step="0.1" value="0">
    </div>

    <div class="status-panel">
        <strong>📊 실시간 분석</strong><br>
        • 최댓값: <span id="stat-max" style="color:#ff7675">1</span><br>
        • 최솟값: <span id="stat-min" style="color:#74b9ff">-1</span><br>
        • 주기: <span id="stat-period" style="color:#ffeaa7">2.00π</span>
    </div>

    <div style="display:flex; flex-direction:column; gap:8px;">
        <button class="btn-view" onclick="resetView()">그래프 보기 리셋</button>
        <button class="btn-reset" onclick="resetParams()">전체 설정 초기화</button>
    </div>
</div>

<div class="main-content">
    <div id="plot-base" class="plot-container"></div>
    <div id="plot-dynamic" class="plot-container"></div>
</div>

<script>
    let currentMode = 'sin';
    const PI = Math.PI;

    function draw() {
        const a = parseFloat(document.getElementById('input-a').value);
        const b = parseFloat(document.getElementById('input-b').value);
        const c = parseFloat(document.getElementById('input-c').value);
        const d = parseFloat(document.getElementById('input-d').value);

        // UI 업데이트
        document.getElementById('a-val').innerText = a;
        document.getElementById('b-val').innerText = b;
        document.getElementById('c-val').innerText = (c/PI).toFixed(1) + "π";
        document.getElementById('d-val').innerText = d;

        const x = [], yBase = [], yDyn = [];
        for (let i = -16; i <= 16; i += 0.02) {
            x.push(i);
            const v1 = Math[currentMode](i);
            const v2 = a * Math[currentMode](b * (i - c)) + d;
            
            yBase.push(currentMode === 'tan' && Math.abs(v1) > 10 ? null : v1);
            yDyn.push(currentMode === 'tan' && Math.abs(v2) > 10 ? null : v2);
        }

        const period = (currentMode === 'tan' ? PI : 2*PI) / b;
        const baseP = currentMode === 'tan' ? PI : 2*PI;

        // 분석창 업데이트
        document.getElementById('stat-max').innerText = currentMode === 'tan' ? '∞' : (a + d).toFixed(2);
        document.getElementById('stat-min').innerText = currentMode === 'tan' ? '-∞' : (-a + d).toFixed(2);
        document.getElementById('stat-period').innerText = (period/PI).toFixed(2) + "π";

        const layoutConfig = {
            paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#f8fafc', size: 11 },
            margin: { t: 40, b: 60, l: 50, r: 50 },
            xaxis: {
                gridcolor: 'rgba(255,255,255,0.05)', zerolinecolor: '#fff',
                tickmode: 'array',
                tickvals: [-3*PI, -2*PI, -PI, 0, PI, 2*PI, 3*PI],
                ticktext: ['-3π', '-2π', '-π', '0', 'π', '2π', '3π']
            },
            yaxis: { gridcolor: 'rgba(255,255,255,0.05)', zerolinecolor: '#fff', range: [-5, 5] },
            showlegend: false
        };

        // 원본 그래프
        const baseShapes = [
            { type: 'rect', x0: 0, x1: baseP, y0: -10, y1: 10, fillcolor: 'rgba(255,255,255,0.1)', line: {width: 0} }
        ];
        if(currentMode !== 'tan') {
            baseShapes.push({ type: 'line', x0: -16, x1: 16, y0: 1, y1: 1, line: { color: '#f87171', dash: 'dot', width: 1 } });
            baseShapes.push({ type: 'line', x0: -16, x1: 16, y0: -1, y1: -1, line: { color: '#60a5fa', dash: 'dot', width: 1 } });
        }

        Plotly.react('plot-base', [{ x, y: yBase, line: { color: 'rgba(255,255,255,0.4)', width: 2 } }], {
            ...layoutConfig, title: `기본 함수: y = ${currentMode}(x)`, shapes: baseShapes
        });

        // 변형 그래프
        const dynShapes = [
            { type: 'rect', x0: c, x1: c + period, y0: -10, y1: 10, fillcolor: 'rgba(255,255,255,0.2)', line: {width: 0} }
        ];
        if(currentMode === 'tan') {
            for(let n=-2; n<=2; n++) {
                let asymp = (PI/2 + n*PI + b*c) / b;
                dynShapes.push({ type: 'line', x0: asymp, x1: asymp, y0: -5, y1: 5, line: { color: '#ff4d4d', dash: 'dash', width: 1 } });
            }
        } else {
            dynShapes.push({ type: 'line', x0: -16, x1: 16, y0: a+d, y1: a+d, line: { color: '#f87171', dash: 'dot', width: 1.5 } });
            dynShapes.push({ type: 'line', x0: -16, x1: 16, y0: -a+d, y1: -a+d, line: { color: '#60a5fa', dash: 'dot', width: 1.5 } });
        }

        Plotly.react('plot-dynamic', [{ x, y: yDyn, line: { color: '#56bbff', width: 3 } }], {
            ...layoutConfig, title: `조작 결과: y = ${a}${currentMode}(${b}(x - ${(c/PI).toFixed(1)}π)) + ${d}`,
            shapes: dynShapes
        });
    }

    function updateMode(m) {
        currentMode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + m).classList.add('active');
        draw();
    }

    function resetView() {
        const range = { 'xaxis.range': [-PI*2.5, PI*2.5], 'yaxis.range': [-5, 5] };
        Plotly.relayout('plot-base', range); Plotly.relayout('plot-dynamic', range);
    }

    function resetParams() {
        document.getElementById('input-a').value = 1;
        document.getElementById('input-b').value = 1;
        document.getElementById('input-c').value = 0;
        document.getElementById('input-d').value = 0;
        draw(); resetView();
    }

    window.onload = () => { draw(); resetView(); };
    ['input-a', 'input-b', 'input-c', 'input-d'].forEach(id => document.getElementById(id).oninput = draw);
</script>
</body>
</html>
